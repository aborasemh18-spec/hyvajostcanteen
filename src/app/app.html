@if (currentUser()) {
  <div class="flex h-screen bg-gray-100 dark:bg-gray-900">
    @if (showSidebar()) {
      <app-sidebar (logout)="onLogout()"></app-sidebar>
    }
    <div class="main-content flex-1 flex flex-col h-screen min-w-0 overflow-hidden w-full">
        <app-header (logout)="onLogout()"></app-header>
        <div class="flex-1 overflow-y-auto w-full">
          <router-outlet></router-outlet>
        </div>
    </div>
  </div>
} @else {
  <router-outlet></router-outlet>
}
